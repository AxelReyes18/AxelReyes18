<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Formulario de Registro</title>
</head>

<body>

    <div class="overlay">

        <h1>Formulario de Registro</h1>

        <div class="botones-container">
            <a href="index.html" class="btn">Inicio</a>
            <a href="sobre_mi.html" class="btn">Sobre mi</a>
            <a href="servicios.html" class="btn">Servicios</a>
            <a href="contacto.html" class="btn">Contacto</a>
        </div>

        <div class="contenido">
            <form>

                <input type="text" placeholder="Nombre" required>
                <input type="text" placeholder="Apellido" required>
                <input type="email" placeholder="Email" required>
                <input type="tel" placeholder="Teléfono" required>
                <input type="number" placeholder="Edad" required>
                <input type="password" placeholder="Contraseña" required>

                <textarea placeholder="Comentarios" rows="4"></textarea>

                <div class="botones-form">
                    <button type="submit">Enviar</button>
                    <button type="reset">Reset</button>
                </div>

            </form>
        </div>

    </div>

</body>

</html>
